name: Steward shell release

# On-demand: cut polecat-shell vX.Y.Z, open vendoring PRs to every app, merge
# the ones whose smoke passes. Prompt: .github/steward/shell-release.md.
# Requires CLAUDE_CODE_OAUTH_TOKEN + STEWARD_PAT secrets.

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional release context (what changed / why now)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: steward-shell-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check secrets
        env:
          T: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          P: ${{ secrets.STEWARD_PAT }}
        run: |
          [ -n "$T" ] || { echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is missing"; exit 1; }
          [ -n "$P" ] || { echo "::error::STEWARD_PAT secret is missing"; exit 1; }

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Authenticate git + gh
        env:
          STEWARD_PAT: ${{ secrets.STEWARD_PAT }}
        run: |
          git config --global url."https://x-access-token:${STEWARD_PAT}@github.com/kevinrhaas/".insteadOf "https://github.com/kevinrhaas/"
          git config --global user.name  "polecat-steward"
          git config --global user.email "steward@polecat.live"
          echo "GH_TOKEN=${STEWARD_PAT}" >> "$GITHUB_ENV"

      - name: Install Claude Code + browsers
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -D playwright
          npx playwright install --with-deps chromium webkit

      - name: Run release
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          RELEASE_NOTE: ${{ github.event.inputs.note }}
        run: |
          PROMPT="$(cat .github/steward/shell-release.md)
          ---
          RELEASE_NOTE: ${RELEASE_NOTE:-'(none)'}"
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --max-turns 180 \
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
