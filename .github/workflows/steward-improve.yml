name: Steward improve

# The fleet improvement loop (see .github/steward/improve.md + docs/AUTOMATION.md).
# One unit of work per run, shipped via PR, merged only when smoke is green.
#
# Two modes:
#   • Fleet mode: picks the app that most needs work.
#   • Focus mode: deep-dive on one app — the replacement for the old per-app
#     hourly loops.
#
# ENABLED (2026-07-15): scheduled every 2h in FOCUS mode; the in-file default
# below is jobtracker.polecat.live (the next app in the MIGRATION.md queue) —
# the platform-way replacement for the old per-app hourly loops.
#
# WHICH APP the scheduled runs work on is switchable WITHOUT a commit via the
# STEWARD_FOCUS_APP repo variable (Settings → Secrets and variables → Actions
# → Variables). Precedence, first non-empty wins:
#   1. the `app` dispatch input        (one-off runs from the Actions tab)
#   2. STEWARD_FOCUS_APP repo variable ('manager.polecat.live' → that app;
#                                       the special value 'fleet' → suite-wide
#                                       fleet pick; unset → fall through)
#   3. the in-file default             (currently jobtracker.polecat.live)
# To PAUSE the loop: disable this workflow in the Actions UI (one click, no
# commit) or re-comment the schedule below.
#
# Requires repo secrets:
#   CLAUDE_CODE_OAUTH_TOKEN  (from `claude setup-token`)
#   STEWARD_PAT              (classic PAT, repo scope on kevinrhaas/* — used
#                             for cross-repo clone/push/PR)

on:
  schedule:
    - cron: '9 */2 * * *'     # every 2h, off the :00 rush — comment out to pause
  workflow_dispatch:
    inputs:
      app:
        description: 'Focus on one app (repo name, e.g. autoselector.polecat.live). Empty = fleet pick.'
        required: false
        default: ''

env:
  # dispatch input → STEWARD_FOCUS_APP variable ('fleet' = suite-wide pick) →
  # in-file default. Change the variable, not this file, to retarget the loop.
  FOCUS_APP: ${{ github.event.inputs.app || vars.STEWARD_FOCUS_APP || 'jobtracker.polecat.live' }}

permissions:
  contents: read

# Per-app concurrency: focus runs on DIFFERENT apps proceed in parallel
# (separate repos — no contention); runs on the SAME app queue behind each
# other; the scheduled fleet/variable-driven run has its own lane.
concurrency:
  group: steward-improve-${{ github.event.inputs.app || vars.STEWARD_FOCUS_APP || 'fleet' }}
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Check secrets
        env:
          T: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          P: ${{ secrets.STEWARD_PAT }}
        run: |
          [ -n "$T" ] || { echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is missing"; exit 1; }
          [ -n "$P" ] || { echo "::error::STEWARD_PAT secret is missing"; exit 1; }

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Authenticate git + gh for all kevinrhaas repos
        env:
          STEWARD_PAT: ${{ secrets.STEWARD_PAT }}
        run: |
          git config --global url."https://x-access-token:${STEWARD_PAT}@github.com/kevinrhaas/".insteadOf "https://github.com/kevinrhaas/"
          git config --global user.name  "polecat-steward"
          git config --global user.email "steward@polecat.live"
          echo "GH_TOKEN=${STEWARD_PAT}" >> "$GITHUB_ENV"

      - name: Install Claude Code + browsers
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -D playwright
          # webkit too: several app smoke tests (jobtracker) run the iOS engine
          npx playwright install --with-deps chromium webkit

      - name: Run steward
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # the STEWARD_FOCUS_APP variable's special value 'fleet' forces the
          # suite-wide pick even while an in-file focus default is set
          [ "$FOCUS_APP" = "fleet" ] && FOCUS_APP=""
          PROMPT="$(cat .github/steward/improve.md)
          ---
          FOCUS_APP: ${FOCUS_APP:-'(none — fleet pick)'}"
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --max-turns 150 \
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
