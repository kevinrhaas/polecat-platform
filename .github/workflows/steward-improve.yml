name: Steward improve
# Annotate each run with the app it targets (shows in the Actions list and in
# Manager's Fleet Ops panel). Mirrors the FOCUS_APP env resolution below.
run-name: "Steward improve — ${{ github.event.inputs.app || 'fleet pick' }}${{ github.event.inputs.slices != '' && github.event.inputs.slices != '1' && format(' [{0}/{1}]', github.event.inputs.slice, github.event.inputs.slices) || '' }}"

# The fleet improvement loop (see .github/steward/improve.md + docs/AUTOMATION.md).
# One unit of work per run, shipped via PR, merged only when smoke is green.
#
# DISPATCH-ONLY. Scheduling lives entirely in .github/steward/focus.json, read
# hourly by steward-focus.yml, which dispatches this workflow with an explicit
# `app=<repo>` per enabled app. There is no schedule here and no
# STEWARD_FOCUS_APP variable anymore — focus.json is the single source of truth
# for which apps run and how often (edit it to start/stop/retarget an app;
# effective on the next hourly tick, no workflow edit).
#
# Two modes, chosen by the `app` dispatch input:
#   • Focus mode: `app=<repo>` → deep-dive on that one app (how focus.json runs).
#   • Fleet mode: empty `app` → the steward picks the app that most needs work.
# To PAUSE an app's recurring runs: set its "enabled": false in focus.json.
#
# Requires repo secrets:
#   CLAUDE_CODE_OAUTH_TOKEN  (from `claude setup-token`)
#   STEWARD_PAT              (classic PAT, repo scope on kevinrhaas/* — used
#                             for cross-repo clone/push/PR)

on:
  # No schedule — steward-focus.yml (driven by focus.json) dispatches this per
  # enabled app, and it can be run manually from the Actions tab.
  workflow_dispatch:
    inputs:
      app:
        description: 'Focus on one app (repo name, e.g. autoselector.polecat.live). Empty = fleet pick.'
        required: false
        default: ''
      slice:
        description: 'Which slice of the chain this run is (1-based). Set by the chain; leave 1 for a manual run.'
        required: false
        default: '1'
      slices:
        description: 'Total sequential slices in this chain (focus.json slices; capped at 5). 1 = no chaining.'
        required: false
        default: '1'

env:
  # The app to work on comes from the dispatch input (focus.json passes it per
  # enabled app). Empty — a manual dispatch with no app, or the literal
  # 'fleet' — means the suite-wide fleet pick.
  FOCUS_APP: ${{ github.event.inputs.app }}

permissions:
  contents: read
  actions: write   # lets a run chain the next slice via GITHUB_TOKEN dispatch

# Per-app concurrency: focus runs on DIFFERENT apps proceed in parallel
# (separate repos — no contention); runs on the SAME app queue behind each
# other; the scheduled fleet/variable-driven run has its own lane.
concurrency:
  group: steward-improve-${{ github.event.inputs.app || 'fleet' }}
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check secrets
        env:
          T: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          P: ${{ secrets.STEWARD_PAT }}
        run: |
          [ -n "$T" ] || { echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is missing"; exit 1; }
          [ -n "$P" ] || { echo "::error::STEWARD_PAT secret is missing"; exit 1; }

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Authenticate git + gh for all kevinrhaas repos
        env:
          STEWARD_PAT: ${{ secrets.STEWARD_PAT }}
        run: |
          git config --global url."https://x-access-token:${STEWARD_PAT}@github.com/kevinrhaas/".insteadOf "https://github.com/kevinrhaas/"
          git config --global user.name  "polecat-steward"
          git config --global user.email "steward@polecat.live"
          echo "GH_TOKEN=${STEWARD_PAT}" >> "$GITHUB_ENV"

      - name: Resolve playwright version (browser cache key)
        id: pw
        run: echo "version=$(npm view playwright version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}-chromium-webkit

      - name: Install Claude Code + browsers
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -D playwright
          # webkit too: several app smoke tests (jobtracker) run the iOS engine
          # (~215MB of downloads skipped on a warm browser cache)
          npx playwright install --with-deps chromium webkit

      - name: Run steward
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Optional per-app admin tokens: unlock each app's client-side
          # invite/admin gate (live AND locally-served copies — same key) so
          # focused runs can drive the real UI. Never echo their values into
          # commits, PRs, or issues.
          MANAGER_ADMIN_TOKEN: ${{ secrets.MANAGER_ADMIN_TOKEN }}
          ANALYTICS_ADMIN_TOKEN: ${{ secrets.ANALYTICS_ADMIN_TOKEN }}
          JOBTRACKER_ADMIN_TOKEN: ${{ secrets.JOBTRACKER_ADMIN_TOKEN }}
          RELAY_ADMIN_TOKEN: ${{ secrets.RELAY_ADMIN_TOKEN }}
          MODELSERVER_ADMIN_TOKEN: ${{ secrets.MODELSERVER_ADMIN_TOKEN }}
          # Supabase Postgres password for the analytics M7 (Supabase Auth + RLS)
          # backend work — lets a focused run provision the schema/RLS and run
          # server-side DB integration tests via psql. SERVER-SIDE ONLY: the
          # browser app connects via PostgREST + anon key, never this password.
          # Scope DB work to a throwaway `steward_test` schema — never CREATE/
          # DROP/ALTER/DELETE against live `public` tables. Never echo its value.
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          # Browser-side Supabase creds for the analytics M3.2/M7 round-trip
          # (PostgREST + RLS): the project URL is public (ships in client code),
          # the publishable/anon key (sb_publishable_… on the new key format) is
          # browser-safe under RLS. Lets a focused run test the real connect →
          # sign-in → RLS path, not just server-side SQL. anon key is a secret
          # for hygiene; never echo it. NOT the sb_secret_… key (server-only).
          SUPABASE_URL: https://lnngiprrrcxtsawamqei.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -o pipefail
          # an explicit 'fleet' input (or an empty app) means the suite-wide pick
          [ "$FOCUS_APP" = "fleet" ] && FOCUS_APP=""
          PROMPT="$(cat .github/steward/improve.md)
          ---
          FOCUS_APP: ${FOCUS_APP:-'(none — fleet pick)'}"
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --max-turns 150 \
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep" | tee /tmp/steward-out.txt

      # The run's own account of what it did (the prompt ends by printing a
      # summary) goes to the Steward journal issue — Manager's Fleet Ops shows
      # it in the run's in-panel review.
      - name: Journal the run
        if: always()
        run: bash .github/steward/journal.sh "${{ github.run_id }}" "Steward improve — ${{ github.event.inputs.app || 'fleet pick' }}" "${{ job.status }}" /tmp/steward-out.txt

      # Chain the next slice. focus.json's `slices: N` runs as N SEQUENTIAL units,
      # each dispatched by the previous run on completion — NOT all fired up front
      # (that overflows the per-app concurrency queue, which holds only one running
      # + one pending, so GitHub cancels the surplus). always() so a failed/held
      # slice still hands off to the next independent unit; hard-capped at 5 so a
      # bug can never loop forever. The per-app concurrency group serializes the
      # handoff, and steward-focus skips an app that still has a run in flight, so
      # a chain that outruns the hour just continues without a competing chain.
      - name: Chain next slice
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          APP: ${{ github.event.inputs.app }}
          SLICE: ${{ github.event.inputs.slice || '1' }}
          SLICES: ${{ github.event.inputs.slices || '1' }}
        run: |
          SLICE=${SLICE:-1}; SLICES=${SLICES:-1}
          if [ -n "$APP" ] && [ "$APP" != "fleet" ] \
             && [ "$SLICE" -lt "$SLICES" ] && [ "$SLICE" -lt 5 ]; then
            NEXT=$((SLICE + 1))
            echo "→ chaining slice ${NEXT}/${SLICES} for ${APP}"
            gh workflow run steward-improve.yml -R kevinrhaas/polecat-platform \
              -f app="${APP}" -f slice="${NEXT}" -f slices="${SLICES}"
          else
            echo "no chain (app='${APP}' slice=${SLICE} slices=${SLICES})"
          fi
