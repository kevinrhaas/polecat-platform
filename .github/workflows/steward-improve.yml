name: Steward improve

# The fleet improvement loop (see .github/steward/improve.md + docs/AUTOMATION.md).
# One unit of work per run, shipped via PR, merged only when smoke is green.
#
# Two modes:
#   • Fleet mode: picks the app that most needs work.
#   • Focus mode: deep-dive on one app — the replacement for the old per-app
#     hourly loops.
#
# SCHEDULING is controlled by repo VARIABLES (Settings → Secrets and variables
# → Actions → Variables) — no commit needed to turn the loop on or off:
#   STEWARD_FOCUS_APP   set to a repo name (e.g. manager.polecat.live) → every
#                       scheduled run deep-dives that app. Clear it to stop.
#   STEWARD_FLEET_MODE  set to 'on' → scheduled runs use fleet pick (suite-wide).
#   Neither set → scheduled runs SKIP in seconds (no token spend). This is the
#   default OFF state; the cron below firing is not by itself spend.
# Manual dispatch always runs: the `app` input (which overrides the variable)
# for a one-off focus run, or empty for a one-off fleet pick.
#
# Requires repo secrets:
#   CLAUDE_CODE_OAUTH_TOKEN  (from `claude setup-token`)
#   STEWARD_PAT              (classic PAT, repo scope on kevinrhaas/* — used
#                             for cross-repo clone/push/PR)

on:
  schedule:
    - cron: '9 */2 * * *'     # every 2h, off the :00 rush (gated by the variables above)
  workflow_dispatch:
    inputs:
      app:
        description: 'Focus on one app (repo name, e.g. autoselector.polecat.live). Empty = fleet pick.'
        required: false
        default: ''

env:
  FOCUS_APP: ${{ github.event.inputs.app || vars.STEWARD_FOCUS_APP }}

permissions:
  contents: read

concurrency:
  group: steward-improve
  cancel-in-progress: false

jobs:
  improve:
    # Scheduled runs only proceed when a variable turns the loop on; dispatches
    # always run. Keeps the default state OFF with zero token cost.
    if: github.event_name == 'workflow_dispatch' || vars.STEWARD_FOCUS_APP != '' || vars.STEWARD_FLEET_MODE == 'on'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Check secrets
        env:
          T: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          P: ${{ secrets.STEWARD_PAT }}
        run: |
          [ -n "$T" ] || { echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is missing"; exit 1; }
          [ -n "$P" ] || { echo "::error::STEWARD_PAT secret is missing"; exit 1; }

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Authenticate git + gh for all kevinrhaas repos
        env:
          STEWARD_PAT: ${{ secrets.STEWARD_PAT }}
        run: |
          git config --global url."https://x-access-token:${STEWARD_PAT}@github.com/kevinrhaas/".insteadOf "https://github.com/kevinrhaas/"
          git config --global user.name  "polecat-steward"
          git config --global user.email "steward@polecat.live"
          echo "GH_TOKEN=${STEWARD_PAT}" >> "$GITHUB_ENV"

      - name: Install Claude Code + browsers
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -D playwright
          # webkit too: several app smoke tests (jobtracker) run the iOS engine
          npx playwright install --with-deps chromium webkit

      - name: Run steward
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT="$(cat .github/steward/improve.md)
          ---
          FOCUS_APP: ${FOCUS_APP:-'(none — fleet pick)'}"
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --max-turns 150 \
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
