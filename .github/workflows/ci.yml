name: CI

# Advisory checks on PRs and non-main pushes. Never a deploy gate.
on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check every ES module
        run: |
          set -e
          for f in $(git ls-files '*.js' | grep -v vendor/); do
            node --input-type=module --check < "$f" || { echo "SYNTAX FAIL: $f"; exit 1; }
          done
          for f in $(git ls-files 'scripts/*.mjs'); do
            node --check "$f"
          done
      - name: Manifest freshness
        run: |
          node scripts/gen-manifest.mjs
          git diff --exit-code lib/MANIFEST.json || {
            echo '::error::lib/MANIFEST.json is stale — run node scripts/gen-manifest.mjs'; exit 1; }
