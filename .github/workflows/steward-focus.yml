name: Steward focus scheduler

# Multi-app focus runs, driven by .github/steward/focus.json (the roster).
# Every hour this cheap, Claude-free job reads the roster and dispatches one
# "Steward improve" run per enabled app whose cadence matches the hour
# (everyHours: 1 = every hour, 2 = even UTC hours, 3 = hours divisible by 3…).
#
# Different apps run in PARALLEL (steward-improve uses a per-app concurrency
# group and each app is its own repo, so there's no contention); the same app
# never overlaps itself. Turn apps on/off or change cadence by editing
# focus.json — from the GitHub UI, any Claude session, or (roadmap) the
# Manager console. No workflow edits, takes effect next tick.
#
# Dispatches with the built-in GITHUB_TOKEN (`actions: write` below):
# workflow_dispatch and repository_dispatch are GitHub's documented exceptions
# to the "GITHUB_TOKEN events don't start workflow runs" rule, and a same-repo
# dispatch needs no PAT at all. (The old STEWARD_PAT dispatching 403'd the
# first time the roster actually enabled an app — 2026-07-16.)

on:
  schedule:
    - cron: '3 * * * *'        # hourly, off the :00 rush
  workflow_dispatch: {}         # manual tick for testing

permissions:
  contents: read
  actions: write   # lets GITHUB_TOKEN dispatch steward-improve on this repo

concurrency:
  group: steward-focus
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch focus runs per roster
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=0
          # schedule.mjs is the canonical lane evaluator (cadence, offset,
          # window, startAt, until — see its header). `due` prints the apps
          # whose lanes fire this hour.
          for APP in $(node .github/steward/schedule.mjs due); do
            echo "→ dispatching focus run for ${APP}"
            gh workflow run steward-improve.yml -R kevinrhaas/polecat-platform -f app="${APP}"
            COUNT=$((COUNT+1))
          done
          # Platform-level jobs (focus.json `jobs`) ride the same tick and the
          # same lane schema: fleet-improve → suite-wide steward pick;
          # sweep-ux / sweep-tech / janitor → their workflows (their own crons
          # are retired — this roster is the single scheduler).
          for JOB in $(node .github/steward/schedule.mjs due-jobs); do
            case "$JOB" in
              fleet-improve) WF="steward-improve.yml"; ARGS="-f app=fleet" ;;
              sweep-ux)      WF="steward-sweep-ux.yml"; ARGS="" ;;
              sweep-tech)    WF="steward-sweep-tech.yml"; ARGS="" ;;
              janitor)       WF="steward-janitor.yml"; ARGS="" ;;
              *) echo "::warning::unknown roster job '$JOB' — skipping"; continue ;;
            esac
            echo "→ dispatching job ${JOB} (${WF})"
            gh workflow run "$WF" -R kevinrhaas/polecat-platform $ARGS
            COUNT=$((COUNT+1))
          done
          echo "Dispatched ${COUNT} run(s) for UTC hour $(date -u +%-H)."
          [ "$COUNT" -eq 0 ] && echo "(nothing on the roster is due this hour)" || true
