name: Sync shell to app repos

# Opens a "chore: polecat-shell vX.Y.Z" PR against each requested app repo,
# replacing its vendor/polecat-shell/ with this repo's lib/ (minus demo/).
# Nothing auto-merges: the fleet steward reviews each PR after that app's
# smoke test passes. Requires a SYNC_SHELL_PAT secret (repo scope on the
# kevinrhaas app repos) because GITHUB_TOKEN can't reach sibling repos.
#
# Most apps vendor at the repo root (vendor/polecat-shell/). Monorepo spokes
# vendor under their app subdirectory — declared in the vendor_dir() map
# below (solution-engineering hosts modelserver at model-server/).
on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Space-separated repo names (e.g. "games.polecat.live relay.polecat.live"), or "all"'
        required: true
        default: all
      ref:
        description: 'Platform ref to sync from'
        required: false
        default: main

permissions:
  contents: read

env:
  ALL_APPS: >-
    games.polecat.live relay.polecat.live jobtracker.polecat.live
    manager.polecat.live autoselector.polecat.live analytics.polecat.live
    polecat-app solution-engineering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Fresh manifest
        run: node scripts/gen-manifest.mjs
      - name: Open PRs
        env:
          # STEWARD_PAT is the repo's standard cross-repo PAT (docs/AUTOMATION.md);
          # SYNC_SHELL_PAT is honored if separately configured.
          GH_TOKEN: ${{ secrets.SYNC_SHELL_PAT || secrets.STEWARD_PAT }}
        run: |
          set -e
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::No cross-repo token: set STEWARD_PAT (or SYNC_SHELL_PAT) in repo secrets."
            exit 1
          fi
          # Where each repo keeps its vendored shell. Default: repo root.
          # Monorepo spokes map to their app subdirectory here.
          vendor_dir() {
            case "$1" in
              solution-engineering) echo "model-server/static/vendor/polecat-shell" ;;
              *)                    echo "vendor/polecat-shell" ;;
            esac
          }
          VERSION="$(cat lib/VERSION)"
          APPS="${{ github.event.inputs.apps }}"
          [ "$APPS" = "all" ] && APPS="$ALL_APPS"
          for APP in $APPS; do
            echo "=== $APP ==="
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/kevinrhaas/${APP}.git" /tmp/app
            cd /tmp/app
            VENDOR="$(vendor_dir "$APP")"
            BRANCH="chore/polecat-shell-v${VERSION}"
            git checkout -b "$BRANCH"
            rm -rf "$VENDOR"
            mkdir -p "$VENDOR"
            rsync -a --exclude 'demo/' "$GITHUB_WORKSPACE/lib/" "$VENDOR/"
            git add "$VENDOR"
            if git diff --cached --quiet; then
              echo "already at v${VERSION}, skipping"; cd -; rm -rf /tmp/app; continue
            fi
            git config user.name "polecat-platform"
            git config user.email "ci@polecat.live"
            git commit -m "chore: polecat-shell v${VERSION}"
            git push -u origin "$BRANCH" --force
            # Create the PR, but never swallow a real failure: a rate-limited
            # `gh pr create` once left branches pushed with NO PRs while the
            # job reported success. Retry once, then verify a PR actually
            # exists for the branch; a pushed-but-PR-less app fails the job.
            if ! gh pr create --title "chore: polecat-shell v${VERSION}" \
              --body "Vendored shell update from polecat-platform@${{ github.event.inputs.ref }} into ${VENDOR}/. Review after this app's smoke passes. The vendored shell is read-only in app repos — see docs/SHELL-API.md in polecat-platform." \
              --head "$BRANCH"; then
              echo "pr create failed — retrying in 30s"
              sleep 30
              gh pr create --title "chore: polecat-shell v${VERSION}" \
                --body "Vendored shell update from polecat-platform@${{ github.event.inputs.ref }} into ${VENDOR}/. Review after this app's smoke passes. The vendored shell is read-only in app repos — see docs/SHELL-API.md in polecat-platform." \
                --head "$BRANCH" || true
              if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number' 2>/dev/null)" ]; then
                echo "::error::${APP}: branch ${BRANCH} pushed but no open PR exists — open it manually or re-dispatch."
                FAILED="${FAILED} ${APP}"
              else
                echo "PR exists for ${BRANCH}."
              fi
            fi
            cd -; rm -rf /tmp/app
          done
          if [ -n "${FAILED:-}" ]; then
            echo "::error::PR creation incomplete for:${FAILED}"
            exit 1
          fi
